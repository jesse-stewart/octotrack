# Cross.toml — configuration for `cross` cross-compilation tool.
# https://github.com/cross-rs/cross
#
# Each [target.*] section installs libasound2-dev for the target architecture
# inside the cross Docker container before cargo build runs.

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update && apt-get install -y libasound2-dev:arm64",
]

[target.armv7-unknown-linux-gnueabihf]
pre-build = [
    "dpkg --add-architecture armhf",
    "apt-get update && apt-get install -y libasound2-dev:armhf",
]

[target.arm-unknown-linux-gnueabihf]
pre-build = [
    "dpkg --add-architecture armhf",
    "apt-get update && apt-get install -y libasound2-dev:armhf",
]
