name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build
        run: cargo build --release

  coverage:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache tarpaulin binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tarpaulin
          key: ${{ runner.os }}-tarpaulin-v0.35

      - name: Install cargo-tarpaulin
        run: command -v cargo-tarpaulin || cargo install cargo-tarpaulin

      - name: Generate coverage report
        run: mkdir -p coverage && cargo tarpaulin --out xml --out stdout --output-dir coverage 2>&1 | tee coverage/tarpaulin.txt || true

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('coverage/tarpaulin.txt', 'utf8');
            // Extract only the per-file summary and total line (skip uncovered line lists)
            const lines = output.split('\n');
            const summaryLines = lines.filter(l =>
              (l.startsWith('|| src/') && l.includes('Tested/Total') === false && l.includes('/') && l.includes('+')) ||
              l.includes('% coverage')
            );
            // Also grab the Tested/Total header
            const headerLine = lines.find(l => l.includes('Tested/Total'));
            const parts = [headerLine, ...summaryLines].filter(Boolean);
            const body = `## Test Coverage Report\n\n\`\`\`\n${parts.join('\n')}\n\`\`\`\n\n*Generated by [cargo-tarpaulin](https://github.com/xd009642/tarpaulin)*`;

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.body.includes('## Test Coverage Report'));
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false
