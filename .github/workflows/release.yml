name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            name: octotrack-linux-arm64
            use_cross: true
          - target: armv7-unknown-linux-gnueabihf
            name: octotrack-linux-armv7
            use_cross: true
          - target: arm-unknown-linux-gnueabihf
            name: octotrack-linux-armv6
            use_cross: true
          - target: x86_64-unknown-linux-gnu
            name: octotrack-linux-x86_64
            use_cross: false

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Install system dependencies (x86_64)
        if: matrix.use_cross == false
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/octotrack ${{ matrix.name }}
          chmod +x ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          body_path: CHANGELOG.md
          files: |
            octotrack-linux-arm64/octotrack-linux-arm64
            octotrack-linux-armv7/octotrack-linux-armv7
            octotrack-linux-armv6/octotrack-linux-armv6
            octotrack-linux-x86_64/octotrack-linux-x86_64
