name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: true   # if any target fails, stop immediately rather than releasing a partial set
      matrix:
        include:
          # Pi 3 / Pi 4 / Pi 5 / Pi Zero 2 W — 64-bit Raspberry Pi OS (Bullseye/Bookworm)
          - target: aarch64-unknown-linux-gnu
            name: octotrack-linux-arm64
            use_cross: true

          # Pi 2 / Pi 3 / Pi Zero 2 W — 32-bit Raspberry Pi OS
          - target: armv7-unknown-linux-gnueabihf
            name: octotrack-linux-armv7
            use_cross: true

          # Pi Zero (v1) / Pi 1 — ARMv6, 32-bit Raspberry Pi OS
          - target: arm-unknown-linux-gnueabihf
            name: octotrack-linux-armv6
            use_cross: true

          # x86_64 Linux desktop / server
          - target: x86_64-unknown-linux-gnu
            name: octotrack-linux-x86_64
            use_cross: false

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross@0.2.5

      - name: Install system dependencies (x86_64)
        if: matrix.use_cross == false
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/octotrack ${{ matrix.name }}
          chmod +x ${{ matrix.name }}

      - name: Verify binary
        run: file ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          fail_on_unmatched_files: true
          body_path: CHANGELOG.md
          files: |
            octotrack-linux-arm64/octotrack-linux-arm64
            octotrack-linux-armv7/octotrack-linux-armv7
            octotrack-linux-armv6/octotrack-linux-armv6
            octotrack-linux-x86_64/octotrack-linux-x86_64
